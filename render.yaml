services:
  - type: web
    name: dms-backend
    runtime: docker
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_DIR
        value: /var/lib/dms
      - key: TRUST_PROXY
        value: true
      - key: PUBLIC_APP_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: DEFAULT_COUNTRY_CODE
        value: 966
    disk:
      name: dms-storage
      mountPath: /var/lib/dms
      sizeGB: 1
